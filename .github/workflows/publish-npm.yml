# Publishes @nest-langchain/* packages when changesets are pushed to main.
#
# Flow:
#   1. On push to main, run formatting + typecheck + tests + build.
#   2. If `.changeset/` has pending entries, run `pnpm changeset version`
#      to bump package versions and write CHANGELOGs, then commit the
#      result directly back to main (no Release PR is created, so this
#      works even when the repo disallows GitHub Actions from creating
#      pull requests).
#   3. Run `pnpm release` to publish to npm via OIDC Trusted Publishing.
#
# Auth uses npm OIDC Trusted Publishing; no NPM_TOKEN secret is required.
# Configure this repo + workflow as a Trusted Publisher on npmjs.com for
# each package.
#
# Manual dispatch is supported so the workflow can be retried after
# fixing automation issues, without having to push a new commit.

name: Publish npm Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Required so the bot can push version-bump commits back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      # OIDC trusted publishing requires npm >= 11.5.1; keep this explicit
      # so the workflow does not depend on the Node image's bundled npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Check package boundaries, types, tests, and builds
        run: pnpm check

      - name: Configure git for version-bump commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply pending changesets
        # `pnpm changeset status --since=main` exits non-zero when there
        # are pending changesets, so we run version unconditionally and
        # skip the push/commit when nothing changed.
        run: |
          set -e
          pnpm changeset version
          if [ -z "$(git status --porcelain)" ]; then
            echo "No pending changesets; skipping publish."
            exit 0
          fi
          git add .
          git commit -m "Version Packages"
          git push origin HEAD:main

      - name: Publish to npm
        # Only publish on the push trigger; manual dispatch is allowed for
        # re-running version/apply steps but we never want a manual click
        # to push to npm outside the normal main-driven flow.
        if: github.event_name == 'push'
        run: pnpm release
        env:
          NPM_CONFIG_PROVENANCE: true
